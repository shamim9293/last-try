<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobCanvas | Beginner Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-5 md:p-10">

    <div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-sm mb-8 flex justify-around border border-gray-200">
        <div class="text-center">
            <p class="text-gray-400 text-xs uppercase font-bold tracking-wider">Total</p>
            <p id="total-count" class="text-2xl font-black text-slate-800">0</p>
        </div>
        <div class="text-center">
            <p class="text-green-400 text-xs uppercase font-bold tracking-wider">Interview</p>
            <p id="interview-count" class="text-2xl font-black text-green-600">0</p>
        </div>
        <div class="text-center">
            <p class="text-red-400 text-xs uppercase font-bold tracking-wider">Rejected</p>
            <p id="rejected-count" class="text-2xl font-black text-red-600">0</p>
        </div>
    </div>

    <div class="max-w-2xl mx-auto mb-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-slate-700">Available Jobs</h2>
            <span class="bg-white px-3 py-1 rounded-full border text-xs font-bold text-slate-500">
                Jobs: <span id="current-tab-count" class="text-indigo-600">0</span>
            </span>
        </div>
        
        <div class="flex gap-2 bg-gray-200 p-1 rounded-xl w-fit">
            <button onclick="changeTab('All', this)" class="tab-btn px-4 py-2 rounded-lg bg-white shadow text-sm font-bold transition-all">All</button>
            <button onclick="changeTab('Interview', this)" class="tab-btn px-4 py-2 rounded-lg text-sm font-bold text-slate-500 transition-all">Interview</button>
            <button onclick="changeTab('Rejected', this)" class="tab-btn px-4 py-2 rounded-lg text-sm font-bold text-slate-500 transition-all">Rejected</button>
        </div>
    </div>

    <div id="job-list" class="max-w-2xl mx-auto space-y-5">
        </div>

    <div id="no-jobs" class="hidden text-center py-20 bg-white max-w-2xl mx-auto rounded-3xl border-2 border-dashed border-gray-200">
        <div class="bg-gray-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
            <i data-lucide="ghost" class="text-gray-300"></i>
        </div>
        <h3 class="text-lg font-bold text-slate-400">No Jobs Available</h3>
        <p class="text-slate-300 text-sm">Category is currently empty.</p>
    </div>

    <script>
        let jobs = [
            { id: 1, company: "Google", role: "Software Engineer", loc: "Remote", pay: "$120k", desc: "Work on world-class search engines.", status: "All" },
            { id: 2, company: "Meta", role: "UI Designer", loc: "USA", pay: "$110k", desc: "Design the future of social apps.", status: "All" },
            { id: 3, company: "Amazon", role: "Backend Dev", loc: "Remote", pay: "$105k", desc: "Scaling cloud infrastructure.", status: "All" },
            { id: 4, company: "Netflix", role: "Data Scientist", loc: "Hybrid", pay: "$95k", desc: "Content recommendation systems.", status: "All" },
            { id: 5, company: "Tesla", role: "AI Engineer", loc: "Austin", pay: "$130k", desc: "Self-driving car algorithms.", status: "All" },
            { id: 6, company: "Spotify", role: "App Developer", loc: "Remote", pay: "$100k", desc: "Developing music experiences.", status: "All" },
            { id: 7, company: "Shopify", role: "Frontend Dev", loc: "Canada", pay: "$115k", desc: "Building e-commerce tools.", status: "All" },
            { id: 8, company: "Airbnb", role: "UX Researcher", loc: "Hybrid", pay: "$125k", desc: "Understanding traveler needs.", status: "All" }
        ];

        let currentTab = "All";

        function showJobs() {
            const list = document.getElementById('job-list');
            const emptyMsg = document.getElementById('no-jobs');
            
            let filtered = currentTab === "All" ? jobs : jobs.filter(j => j.status === currentTab);

            document.getElementById('total-count').innerText = jobs.length;
            document.getElementById('interview-count').innerText = jobs.filter(j => j.status === 'Interview').length;
            document.getElementById('rejected-count').innerText = jobs.filter(j => j.status === 'Rejected').length;
            document.getElementById('current-tab-count').innerText = filtered.length;

            if (filtered.length === 0) {
                list.innerHTML = "";
                emptyMsg.classList.remove('hidden');
            } else {
                emptyMsg.classList.add('hidden');
                list.innerHTML = filtered.map(job => `
                    <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm relative group hover:shadow-md transition-all">
                        <button onclick="deleteJob(${job.id})" class="absolute top-4 right-4 text-gray-300 hover:text-red-500">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>

                        <div class="mb-5">
                            <h3 class="text-lg font-bold text-slate-800">${job.role}</h3>
                            <p class="text-indigo-600 font-bold text-sm mb-2">${job.company}</p>
                            <div class="flex gap-3 text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3">
                                <span>${job.loc}</span> • <span>${job.pay}</span>
                            </div>
                            <p class="text-slate-500 text-sm leading-relaxed">${job.desc}</p>
                        </div>

                        <div class="flex gap-2 pt-4 border-t border-gray-50">
                            <button onclick="setStatus(${job.id}, 'Interview')" 
                                class="flex-1 py-2 text-xs font-bold rounded-xl transition-all border-2 
                                ${job.status === 'Interview' ? 'bg-green-500 border-green-500 text-white' : 'border-green-500 text-green-500 hover:bg-green-50' }">
                                Interview
                            </button>
                            <button onclick="setStatus(${job.id}, 'Rejected')" 
                                class="flex-1 py-2 text-xs font-bold rounded-xl transition-all border-2 
                                ${job.status === 'Rejected' ? 'bg-red-500 border-red-500 text-white' : 'border-red-500 text-red-500 hover:bg-red-50' }">
                                Rejected
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function setStatus(id, s) {
            jobs = jobs.map(j => j.id === id ? {...j, status: s} : j);
            showJobs();
        }

        function changeTab(tab, el) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-white', 'shadow', 'text-slate-800');
                b.classList.add('text-slate-500');
            });
            el.classList.add('bg-white', 'shadow', 'text-slate-800');
            el.classList.remove('text-slate-500');
            showJobs();
        }

        function deleteJob(id) {
            if(confirm("Delete this?")) {
                jobs = jobs.filter(j => j.id !== id);
                showJobs();
            }
        }

        window.onload = showJobs;
    </script>
</body>
</html>
